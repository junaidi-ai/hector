name: Publish Badge JSON to Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'result/**'
      - 'scripts/generate_badge_json.py'
      - 'scripts/generate_pages_html.py'
      - '.github/workflows/pages.yml'
      - 'docs/**'
  schedule:
    - cron: '0 2 * * *' # Nightly at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.x"
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Generate badge JSON
        run: uv run python scripts/generate_badge_json.py
      - name: Generate Pages HTML
        run: uv run python scripts/generate_pages_html.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
