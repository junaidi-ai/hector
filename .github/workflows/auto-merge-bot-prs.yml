name: Auto-merge bot PRs

on:
  schedule:
    - cron: '0 1 * * *' # Once daily at 01:00 UTC (1h after the midnight scan)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Merge open bot PRs (oldest to newest)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const { data: pulls } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const prs = pulls
              .filter(pr => pr.user?.login === 'github-actions[bot]' && pr.head?.repo?.full_name === `${owner}/${repo}`)
              .sort((a, b) => a.number - b.number);
            if (prs.length === 0) {
              core.info('No open bot PRs to merge.');
              return;
            }
            for (const pr of prs) {
              try {
                await github.rest.pulls.merge({ owner, repo, pull_number: pr.number, merge_method: 'squash' });
                core.info(`Merged PR #${pr.number}`);
              } catch (e) {
                core.info(`Skip PR #${pr.number} (not mergeable yet): ${e.message}`);
              }
            }
